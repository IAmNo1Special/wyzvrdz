name: Mdformat
on: [push, pull_request]

jobs:
  mdformat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

      - name: Install mdformat and plugins
        run: |
          pip install mdformat==0.7.22 \
            mdformat-gfm \
            mdformat-frontmatter \
            mdformat-tables \
            mdformat-wikilink

      - name: Mdformat Check
        run: mdformat --check .
